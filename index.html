<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="flex-container">
        <div class="background">
          <div class="profile-container">
            <div class="image-container">
              <img
                class="profile-picture"
                src="assets/images/avatar-jessica.jpeg"
                alt="Woman with curly hair"
              />
            </div>
            <p id="profile-name">Jessica Randall</p>
            <p id="address">London, United Kingdom</p>
            <p class="job-info">"Front-end developer and avid reader."</p>
            <p class="social-link">Github</p>
            <p class="social-link">Frontend Mentor</p>
            <p class="social-link">Twitter</p>
            <p class="social-link">Twitter</p>
            <p class="social-link">LinkedIn</p>
            <p class="social-link" id="instagram">Instagram</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
